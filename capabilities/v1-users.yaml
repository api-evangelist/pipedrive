naftiko: 1.0.0-alpha2
info:
  label: Pipedrive API v1 — Users
  description: 'Pipedrive API v1 — Users. 10 operations. Lead operation: Get all users. Self-contained Naftiko capability
    covering one Pipedrive business surface.'
  tags:
  - Pipedrive
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PIPEDRIVE_API_KEY: PIPEDRIVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: v1-users
    baseUri: https://api.pipedrive.com/v1
    description: Pipedrive API v1 — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: getusers
        method: GET
        description: Get all users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: adduser
        method: POST
        description: Add a new user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: users-find
      path: /users/find
      operations:
      - name: findusersbyname
        method: GET
        description: Find users by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: term
          in: query
          type: string
          description: The search term to look for
          required: true
        - name: search_by_email
          in: query
          type: number
          description: 'When enabled, the term will only be matched against email addresses of users. Default: `false`.'
    - name: users-me
      path: /users/me
      operations:
      - name: getcurrentuser
        method: GET
        description: Get current user data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-id
      path: /users/{id}
      operations:
      - name: getuser
        method: GET
        description: Get one user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the user
          required: true
      - name: updateuser
        method: PUT
        description: Update user details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the user
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: users-id-followers
      path: /users/{id}/followers
      operations:
      - name: getuserfollowers
        method: GET
        description: List followers of a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the user
          required: true
    - name: users-id-permissions
      path: /users/{id}/permissions
      operations:
      - name: getuserpermissions
        method: GET
        description: List user permissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the user
          required: true
    - name: users-id-roleAssignments
      path: /users/{id}/roleAssignments
      operations:
      - name: getuserroleassignments
        method: GET
        description: List role assignments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the user
          required: true
        - name: start
          in: query
          type: integer
          description: Pagination start
        - name: limit
          in: query
          type: integer
          description: Items shown per page
    - name: users-id-roleSettings
      path: /users/{id}/roleSettings
      operations:
      - name: getuserrolesettings
        method: GET
        description: List user role settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the user
          required: true
    authentication:
      type: bearer
      token: '{{env.PIPEDRIVE_API_KEY}}'
  exposes:
  - type: rest
    namespace: v1-users-rest
    port: 8080
    description: REST adapter for Pipedrive API v1 — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: getusers
        description: Get all users
        call: v1-users.getusers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: adduser
        description: Add a new user
        call: v1-users.adduser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/find
      name: users-find
      description: REST surface for users-find.
      operations:
