        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v1-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pipedrive API v1 — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-all-users
      description: Get all users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
