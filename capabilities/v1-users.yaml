      description: REST surface for users-id-permissions.
      operations:
      - method: GET
        name: getuserpermissions
        description: List user permissions
        call: v1-users.getuserpermissions
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{id}/roleassignments
