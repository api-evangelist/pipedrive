      description: REST surface for users-id-followers.
      operations:
      - method: GET
        name: getuserfollowers
        description: List followers of a user
        call: v1-users.getuserfollowers
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{id}/permissions
