    namespace: v2-projectboards-rest
    port: 8080
    description: REST adapter for Pipedrive API v2 — ProjectBoards. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/boards
      name: boards
      description: REST surface for boards.
      operations:
      - method: GET
        name: getprojectsboards
        description: Get all project boards
        call: v2-projectboards.getprojectsboards
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addprojectboard
        description: Add a project board
        call: v2-projectboards.addprojectboard
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/boards/{id}
