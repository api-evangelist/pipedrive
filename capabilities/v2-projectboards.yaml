        call: v2-projectboards.updateprojectboard
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteprojectboard
        description: Delete a project board
        call: v2-projectboards.deleteprojectboard
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
