    resources:
    - name: boards
      path: /boards
      operations:
      - name: getprojectsboards
        method: GET
        description: Get all project boards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addprojectboard
        method: POST
        description: Add a project board
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: boards-id
      path: /boards/{id}
      operations:
      - name: getprojectsboard
        method: GET
        description: Get details of a project board
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the project board
          required: true
      - name: updateprojectboard
        method: PATCH
        description: Update a project board
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the project board
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteprojectboard
        method: DELETE
        description: Delete a project board
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the project board
          required: true
