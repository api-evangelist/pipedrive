        destructive: false
        idempotent: true
      call: v2-projectboards.getprojectsboard
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-project-board
      description: Update a project board
      hints:
        readOnly: false
