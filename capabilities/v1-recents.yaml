naftiko: 1.0.0-alpha2
info:
  label: Pipedrive API v1 — Recents
  description: 'Pipedrive API v1 — Recents. 1 operations. Lead operation: Get recents. Self-contained Naftiko capability covering
    one Pipedrive business surface.'
  tags:
  - Pipedrive
  - Recents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PIPEDRIVE_API_KEY: PIPEDRIVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: v1-recents
    baseUri: https://api.pipedrive.com/v1
    description: Pipedrive API v1 — Recents business capability. Self-contained, no shared references.
    resources:
    - name: recents
      path: /recents
      operations:
      - name: getrecents
        method: GET
        description: Get recents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: since_timestamp
          in: query
          type: string
          description: 'The timestamp in UTC. Format: YYYY-MM-DD HH:MM:SS.'
          required: true
        - name: items
          in: query
          type: string
          description: Multiple selection of item types to include in the query (optional)
        - name: start
          in: query
          type: integer
          description: Pagination start
        - name: limit
          in: query
          type: integer
          description: Items shown per page
    authentication:
      type: bearer
      token: '{{env.PIPEDRIVE_API_KEY}}'
  exposes:
  - type: rest
    namespace: v1-recents-rest
    port: 8080
    description: REST adapter for Pipedrive API v1 — Recents. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/recents
      name: recents
      description: REST surface for recents.
      operations:
      - method: GET
        name: getrecents
        description: Get recents
        call: v1-recents.getrecents
        with:
          since_timestamp: rest.since_timestamp
          items: rest.items
          start: rest.start
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v1-recents-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pipedrive API v1 — Recents. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-recents
      description: Get recents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v1-recents.getrecents
      with:
        since_timestamp: tools.since_timestamp
        items: tools.items
        start: tools.start
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
