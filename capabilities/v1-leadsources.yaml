naftiko: 1.0.0-alpha2
info:
  label: Pipedrive API v1 — LeadSources
  description: 'Pipedrive API v1 — LeadSources. 1 operations. Lead operation: Get all lead sources. Self-contained Naftiko
    capability covering one Pipedrive business surface.'
  tags:
  - Pipedrive
  - LeadSources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PIPEDRIVE_API_KEY: PIPEDRIVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: v1-leadsources
    baseUri: https://api.pipedrive.com/v1
    description: Pipedrive API v1 — LeadSources business capability. Self-contained, no shared references.
    resources:
    - name: leadSources
      path: /leadSources
      operations:
      - name: getleadsources
        method: GET
        description: Get all lead sources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PIPEDRIVE_API_KEY}}'
  exposes:
  - type: rest
    namespace: v1-leadsources-rest
    port: 8080
    description: REST adapter for Pipedrive API v1 — LeadSources. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/leadsources
      name: leadsources
      description: REST surface for leadSources.
      operations:
      - method: GET
        name: getleadsources
        description: Get all lead sources
        call: v1-leadsources.getleadsources
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v1-leadsources-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pipedrive API v1 — LeadSources. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-all-lead-sources
      description: Get all lead sources
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v1-leadsources.getleadsources
      outputParameters:
      - type: object
        mapping: $.
