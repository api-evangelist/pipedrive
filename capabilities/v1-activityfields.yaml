naftiko: 1.0.0-alpha2
info:
  label: Pipedrive API v1 — ActivityFields
  description: 'Pipedrive API v1 — ActivityFields. 1 operations. Lead operation: Get all activity fields. Self-contained Naftiko
    capability covering one Pipedrive business surface.'
  tags:
  - Pipedrive
  - ActivityFields
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PIPEDRIVE_API_KEY: PIPEDRIVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: v1-activityfields
    baseUri: https://api.pipedrive.com/v1
    description: Pipedrive API v1 — ActivityFields business capability. Self-contained, no shared references.
    resources:
    - name: activityFields
      path: /activityFields
      operations:
      - name: getactivityfields
        method: GET
        description: Get all activity fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PIPEDRIVE_API_KEY}}'
  exposes:
  - type: rest
    namespace: v1-activityfields-rest
    port: 8080
    description: REST adapter for Pipedrive API v1 — ActivityFields. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/activityfields
      name: activityfields
      description: REST surface for activityFields.
      operations:
      - method: GET
        name: getactivityfields
        description: Get all activity fields
        call: v1-activityfields.getactivityfields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v1-activityfields-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pipedrive API v1 — ActivityFields. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-all-activity-fields
      description: Get all activity fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v1-activityfields.getactivityfields
      outputParameters:
      - type: object
        mapping: $.
