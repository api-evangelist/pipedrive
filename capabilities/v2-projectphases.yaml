        name: getprojectsphase
        description: Get details of a project phase
        call: v2-projectphases.getprojectsphase
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateprojectphase
        description: Update a project phase
        call: v2-projectphases.updateprojectphase
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
