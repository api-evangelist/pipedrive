    description: Pipedrive API v2 — ProjectPhases business capability. Self-contained, no shared references.
    resources:
    - name: phases
      path: /phases
      operations:
      - name: getprojectsphases
        method: GET
        description: Get project phases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: query
          type: integer
          description: The ID of the board for which phases are requested
          required: true
      - name: addprojectphase
        method: POST
        description: Add a project phase
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: phases-id
      path: /phases/{id}
      operations:
      - name: getprojectsphase
        method: GET
        description: Get details of a project phase
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the project phase
          required: true
      - name: updateprojectphase
        method: PATCH
        description: Update a project phase
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the project phase
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteprojectphase
        method: DELETE
        description: Delete a project phase
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the project phase
          required: true
