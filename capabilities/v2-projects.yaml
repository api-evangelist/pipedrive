        call: v2-projects.getprojectchangelog
        with:
          id: rest.id
          limit: rest.limit
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{id}/permittedusers
      name: projects-id-permittedusers
      description: REST surface for projects-id-permittedUsers.
      operations:
      - method: GET
        name: getprojectusers
        description: List permitted users
