  - type: mcp
    namespace: v2-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pipedrive API v2 — Projects. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-all-projects
      description: Get all projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v2-projects.getprojects
