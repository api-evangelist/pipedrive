        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{id}
      name: projects-id
      description: REST surface for projects-id.
      operations:
      - method: GET
        name: getproject
        description: Get details of a project
        call: v2-projects.getproject
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateproject
        description: Update a project
        call: v2-projects.updateproject
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteproject
        description: Delete a project
        call: v2-projects.deleteproject
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{id}/archive
      name: projects-id-archive
      description: REST surface for projects-id-archive.
      operations:
      - method: POST
        name: archiveproject
        description: Archive a project
        call: v2-projects.archiveproject
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{id}/changelog
      name: projects-id-changelog
