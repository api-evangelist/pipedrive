        destructive: false
        idempotent: true
      call: v1-legacyteams.getteamusers
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: add-users-team
      description: Add users to a team
      hints:
        readOnly: false
