naftiko: 1.0.0-alpha2
info:
  label: Pipedrive API v1 — LegacyTeams
  description: 'Pipedrive API v1 — LegacyTeams. 8 operations. Lead operation: Get all teams. Self-contained Naftiko capability
    covering one Pipedrive business surface.'
  tags:
  - Pipedrive
  - LegacyTeams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PIPEDRIVE_API_KEY: PIPEDRIVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: v1-legacyteams
    baseUri: https://api.pipedrive.com/v1
    description: Pipedrive API v1 — LegacyTeams business capability. Self-contained, no shared references.
    resources:
    - name: legacyTeams
      path: /legacyTeams
      operations:
      - name: getteams
        method: GET
        description: Get all teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_by
          in: query
          type: string
          description: The field name to sort returned teams by
        - name: skip_users
          in: query
          type: number
          description: When enabled, the teams will not include IDs of member users
      - name: addteam
        method: POST
        description: Add a new team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: legacyTeams-user-id
      path: /legacyTeams/user/{id}
      operations:
      - name: getuserteams
        method: GET
        description: Get all teams of a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the user
          required: true
        - name: order_by
          in: query
          type: string
          description: The field name to sort returned teams by
        - name: skip_users
          in: query
          type: number
          description: When enabled, the teams will not include IDs of member users
    - name: legacyTeams-id
      path: /legacyTeams/{id}
      operations:
      - name: getteam
        method: GET
        description: Get a single team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the team
          required: true
        - name: skip_users
          in: query
          type: number
          description: When enabled, the teams will not include IDs of member users
      - name: updateteam
        method: PUT
        description: Update a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the team
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: legacyTeams-id-users
      path: /legacyTeams/{id}/users
      operations:
      - name: getteamusers
        method: GET
        description: Get all users in a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the team
          required: true
      - name: addteamuser
        method: POST
        description: Add users to a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the team
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteteamuser
        method: DELETE
        description: Delete users from a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the team
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.PIPEDRIVE_API_KEY}}'
  exposes:
  - type: rest
    namespace: v1-legacyteams-rest
    port: 8080
    description: REST adapter for Pipedrive API v1 — LegacyTeams. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/legacyteams
      name: legacyteams
      description: REST surface for legacyTeams.
      operations:
      - method: GET
        name: getteams
        description: Get all teams
        call: v1-legacyteams.getteams
        with:
          order_by: rest.order_by
          skip_users: rest.skip_users
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addteam
        description: Add a new team
        call: v1-legacyteams.addteam
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/legacyteams/user/{id}
      name: legacyteams-user-id
      description: REST surface for legacyTeams-user-id.
      operations:
      - method: GET
        name: getuserteams
        description: Get all teams of a user
        call: v1-legacyteams.getuserteams
        with:
          id: rest.id
          order_by: rest.order_by
          skip_users: rest.skip_users
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/legacyteams/{id}
      name: legacyteams-id
      description: REST surface for legacyTeams-id.
      operations:
      - method: GET
        name: getteam
        description: Get a single team
        call: v1-legacyteams.getteam
        with:
          id: rest.id
          skip_users: rest.skip_users
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateteam
        description: Update a team
        call: v1-legacyteams.updateteam
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/legacyteams/{id}/users
      name: legacyteams-id-users
      description: REST surface for legacyTeams-id-users.
      operations:
      - method: GET
        name: getteamusers
        description: Get all users in a team
        call: v1-legacyteams.getteamusers
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addteamuser
        description: Add users to a team
        call: v1-legacyteams.addteamuser
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteteamuser
        description: Delete users from a team
        call: v1-legacyteams.deleteteamuser
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
