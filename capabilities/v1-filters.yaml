naftiko: 1.0.0-alpha2
info:
  label: Pipedrive API v1 — Filters
  description: 'Pipedrive API v1 — Filters. 7 operations. Lead operation: Delete multiple filters in bulk. Self-contained
    Naftiko capability covering one Pipedrive business surface.'
  tags:
  - Pipedrive
  - Filters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PIPEDRIVE_API_KEY: PIPEDRIVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: v1-filters
    baseUri: https://api.pipedrive.com/v1
    description: Pipedrive API v1 — Filters business capability. Self-contained, no shared references.
    resources:
    - name: filters
      path: /filters
      operations:
      - name: deletefilters
        method: DELETE
        description: Delete multiple filters in bulk
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ids
          in: query
          type: string
          description: The comma-separated filter IDs to delete
          required: true
      - name: getfilters
        method: GET
        description: Get all filters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: The types of filters to fetch
      - name: addfilter
        method: POST
        description: Add a new filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include_field_code
          in: query
          type: boolean
          description: If set to `true`, each condition in the response includes a `field_code` field identifying the field
            by its code name
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: filters-helpers
      path: /filters/helpers
      operations:
      - name: getfilterhelpers
        method: GET
        description: Get all filter helpers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: filters-id
      path: /filters/{id}
      operations:
      - name: deletefilter
        method: DELETE
        description: Delete a filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the filter
          required: true
      - name: getfilter
        method: GET
        description: Get one filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the filter
          required: true
        - name: include_field_code
          in: query
          type: boolean
          description: If set to `true`, each condition in the response includes a `field_code` field identifying the field
            by its code name
      - name: updatefilter
        method: PUT
        description: Update filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the filter
          required: true
        - name: include_field_code
          in: query
          type: boolean
          description: If set to `true`, each condition in the response includes a `field_code` field identifying the field
            by its code name
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.PIPEDRIVE_API_KEY}}'
  exposes:
  - type: rest
    namespace: v1-filters-rest
    port: 8080
    description: REST adapter for Pipedrive API v1 — Filters. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/filters
      name: filters
      description: REST surface for filters.
      operations:
      - method: DELETE
        name: deletefilters
        description: Delete multiple filters in bulk
        call: v1-filters.deletefilters
        with:
          ids: rest.ids
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getfilters
        description: Get all filters
        call: v1-filters.getfilters
        with:
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addfilter
        description: Add a new filter
        call: v1-filters.addfilter
        with:
          include_field_code: rest.include_field_code
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/filters/helpers
      name: filters-helpers
      description: REST surface for filters-helpers.
      operations:
      - method: GET
        name: getfilterhelpers
        description: Get all filter helpers
        call: v1-filters.getfilterhelpers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/filters/{id}
      name: filters-id
      description: REST surface for filters-id.
      operations:
      - method: DELETE
        name: deletefilter
        description: Delete a filter
        call: v1-filters.deletefilter
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getfilter
        description: Get one filter
        call: v1-filters.getfilter
        with:
          id: rest.id
          include_field_code: rest.include_field_code
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatefilter
        description: Update filter
        call: v1-filters.updatefilter
        with:
          id: rest.id
          include_field_code: rest.include_field_code
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v1-filters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pipedrive API v1 — Filters. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: delete-multiple-filters-bulk
      description: Delete multiple filters in bulk
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: v1-filters.deletefilters
      with:
        ids: tools.ids
      outputParameters:
      - type: object
        mapping: $.
    - name: get-all-filters
      description: Get all filters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v1-filters.getfilters
      with:
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: add-new-filter
      description: Add a new filter
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v1-filters.addfilter
      with:
        include_field_code: tools.include_field_code
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-all-filter-helpers
      description: Get all filter helpers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v1-filters.getfilterhelpers
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-filter
      description: Delete a filter
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: v1-filters.deletefilter
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-one-filter
      description: Get one filter
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v1-filters.getfilter
      with:
        id: tools.id
        include_field_code: tools.include_field_code
      outputParameters:
      - type: object
        mapping: $.
    - name: update-filter
      description: Update filter
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: v1-filters.updatefilter
      with:
        id: tools.id
        include_field_code: tools.include_field_code
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
