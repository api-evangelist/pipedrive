    resources:
    - name: productFields
      path: /productFields
      operations:
      - name: deleteproductfields
        method: DELETE
        description: Delete multiple product fields in bulk
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ids
          in: query
          type: string
          description: The comma-separated field IDs to delete
          required: true
      - name: getproductfields
        method: GET
        description: Get all product fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start
          in: query
          type: integer
          description: Pagination start
        - name: limit
          in: query
          type: integer
          description: Items shown per page
      - name: addproductfield
        method: POST
        description: Add a new product field
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: productFields-id
      path: /productFields/{id}
