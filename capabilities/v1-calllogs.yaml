naftiko: 1.0.0-alpha2
info:
  label: Pipedrive API v1 — CallLogs
  description: 'Pipedrive API v1 — CallLogs. 5 operations. Lead operation: Add a call log. Self-contained Naftiko capability
    covering one Pipedrive business surface.'
  tags:
  - Pipedrive
  - CallLogs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PIPEDRIVE_API_KEY: PIPEDRIVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: v1-calllogs
    baseUri: https://api.pipedrive.com/v1
    description: Pipedrive API v1 — CallLogs business capability. Self-contained, no shared references.
    resources:
    - name: callLogs
      path: /callLogs
      operations:
      - name: addcalllog
        method: POST
        description: Add a call log
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getusercalllogs
        method: GET
        description: Get all call logs assigned to a particular user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start
          in: query
          type: integer
          description: Pagination start
        - name: limit
          in: query
          type: integer
          description: For pagination, the limit of entries to be returned. The upper limit is 50.
    - name: callLogs-id
      path: /callLogs/{id}
      operations:
      - name: deletecalllog
        method: DELETE
        description: Delete a call log
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID received when you create the call log
          required: true
      - name: getcalllog
        method: GET
        description: Get details of a call log
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID received when you create the call log
          required: true
    - name: callLogs-id-recordings
      path: /callLogs/{id}/recordings
      operations:
      - name: addcalllogaudiofile
        method: POST
        description: Attach an audio file to the call log
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID received when you create the call log
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.PIPEDRIVE_API_KEY}}'
  exposes:
  - type: rest
    namespace: v1-calllogs-rest
    port: 8080
    description: REST adapter for Pipedrive API v1 — CallLogs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/calllogs
      name: calllogs
      description: REST surface for callLogs.
      operations:
      - method: POST
        name: addcalllog
        description: Add a call log
        call: v1-calllogs.addcalllog
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getusercalllogs
        description: Get all call logs assigned to a particular user
        call: v1-calllogs.getusercalllogs
        with:
          start: rest.start
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calllogs/{id}
      name: calllogs-id
      description: REST surface for callLogs-id.
      operations:
      - method: DELETE
        name: deletecalllog
        description: Delete a call log
        call: v1-calllogs.deletecalllog
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getcalllog
        description: Get details of a call log
        call: v1-calllogs.getcalllog
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calllogs/{id}/recordings
      name: calllogs-id-recordings
      description: REST surface for callLogs-id-recordings.
      operations:
      - method: POST
        name: addcalllogaudiofile
        description: Attach an audio file to the call log
        call: v1-calllogs.addcalllogaudiofile
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v1-calllogs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pipedrive API v1 — CallLogs. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: add-call-log
      description: Add a call log
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v1-calllogs.addcalllog
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-all-call-logs-assigned
      description: Get all call logs assigned to a particular user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v1-calllogs.getusercalllogs
      with:
        start: tools.start
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-call-log
      description: Delete a call log
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: v1-calllogs.deletecalllog
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-details-call-log
      description: Get details of a call log
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v1-calllogs.getcalllog
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: attach-audio-file-call-log
      description: Attach an audio file to the call log
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v1-calllogs.addcalllogaudiofile
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
