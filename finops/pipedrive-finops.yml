specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Pipedrive
providerId: pipedrive
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - CRM
  - Sales
  - FinOps
  - FOCUS
description: >-
  Pipedrive bills per-user-per-month subscriptions across five tiers
  (Essential / Advanced / Professional / Power / Enterprise) plus add-ons
  (LeadBooster, Web Visitors, Projects, Smart Docs, Campaigns) and an
  optional API token-budget top-up for high-volume integrations. This
  artifact maps Pipedrive charges to FOCUS columns for FinOps allocation.
sources:
  - https://www.pipedrive.com/en/pricing
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Pipedrive
serviceCategory: CRM
billingModel:
  pricingCategory: Subscription Per Seat
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Tax
focusColumns:
  ServiceName: Pipedrive
  ServiceCategory: CRM
  ProviderName: Pipedrive
  PublisherName: Pipedrive
  InvoiceIssuerName: Pipedrive
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: pipedrive_seats
    description: Active seats on Essential / Advanced / Professional / Power / Enterprise.
    unit: seat-month
    aggregation: sum
    dimensions:
      - tier
      - team
      - cost_center
  - name: pipedrive_addons
    description: LeadBooster / Web Visitors / Projects / Smart Docs / Campaigns add-ons.
    unit: addon-month
    aggregation: sum
    dimensions:
      - addon
      - cost_center
  - name: pipedrive_api_tokens
    description: Daily API token budget consumed by integrations.
    unit: tokens-daily
    aggregation: sum
    dimensions:
      - integration
      - cost_center
  - name: pipedrive_api_token_topups
    description: One-off purchases of additional daily API token budget.
    unit: tokens
    aggregation: sum
    dimensions:
      - integration
principles:
  - name: Visibility
    description: >-
      Pull Pipedrive monthly invoices and reconcile seat counts against
      active users in the Users API. Track API token-budget consumption
      against daily quota.
  - name: Allocation
    description: >-
      Allocate seats by team / sales region; allocate add-ons to the
      function that uses them (e.g. Marketing for Campaigns and
      LeadBooster).
  - name: Optimization
    description: >-
      Lock annual commitment for the discounted rate; right-size tier
      based on actual feature usage. Audit add-on usage quarterly.
  - name: Accountability
    description: >-
      Designate Sales Operations as contract owner; review at renewal.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
