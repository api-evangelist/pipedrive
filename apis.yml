url: https://raw.githubusercontent.com/api-evangelist/pipedrive/refs/heads/main/apis.yml
name: Pipedrive
kind: company
description: Pipedrive is a sales CRM and pipeline management tool focused on small
  and mid-market teams. The Pipedrive REST API exposes deals, persons, organizations,
  activities, leads, products, pipelines, stages, mail, calls, files, notes, users,
  permissions, filters, goals, subscriptions, and webhooks.
